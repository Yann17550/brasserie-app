    <!-- Icône affichée dans l'onglet du navigateur -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Demande aux navigateurs / services Google de ne pas proposer la traduction -->
    <meta name="google" content="notranslate" />
    <meta name="googlebot" content="notranslate" />

    <!-- Paramètres d'affichage mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Couleur principale utilisée par certains navigateurs mobiles -->

    <!-- Description simple de l'application -->

      name="description"
      content="Application de gestion et de suivi des fûts pour la brasserie."
    />

    <!-- Icône utilisée sur iPhone / iPad lors d'un ajout à l'écran d'accueil -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest de l'application web installable -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Titre affiché dans l'onglet du navigateur -->
    <title>Brasserie Île & Elle</title>
  </head>
